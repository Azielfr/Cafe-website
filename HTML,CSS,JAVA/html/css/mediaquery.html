<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 300px;
            border: 1px solid black;
        }
        /* Tablet view */
        @media (max-width:768px){
            .box{
                background-color: red;
            }
        }
        /* Mobile viwe */
        @media (max-width:360px){
            .box{
                background-color: green;
            }
        }
    </style>
</head>
<body>
    <h1>Media query</h1>
    <div class="box">

    </div>
    
</body>
</html>
