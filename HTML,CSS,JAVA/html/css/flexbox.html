<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/HTML,CSS,JAVA/CSS/flexbox.css">
</head>
<body>
    <!-- Flexbox is used to arrange item inside the container in a row or column.
12
Default flex direction is in row.
13
It requires one container and items inside it to use flexbox.
14
Syntax:
15
display: flex; -->

    <h1>Flexbox</h1>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
    <hr>
    <h3>Flex direction</h3>   
    <hr>
    <p>Row</p>
    <div class="container" id="row">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
    <hr>
    <p>column</p>
    <div class="container" id="column">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
    <hr>
    <p>row-reverse</p>
    <div class="container" id="row-reverse">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
    <hr>
    <p>Column-reverse</p>
    <div class="container" id="Column-reverse">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>
</html>
