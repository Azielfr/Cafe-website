<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Color in HSL</h1>
    <!--In hsl
    h- hue , value ranges from 0-360
    s- saturation, value ranges from 0-100
    l- light, value ranges from 0%-100%-->
<!-- in hue , 0 and 360 is red , 120 is green and 240 is blue-->
    <h3 style="background-color: hsl(360, 100%, 50%);">Red</h3>
    <h3 style="background-color: hsl(120, 100%, 50%);">Green</h3>
    <h3 style="background-color: hsl(240, 100%, 50%);">Blue</h3>

    <h1>Saturation HSL</h1>
    <!--In saturation, 0% means gray and 1005 means full color-->
    <h3 style="background-color: hsl(0, 0%, 50%);">0% saturation</h3>
    <h3 style="background-color: hsl(0, 50%, 50%);">50% saturation</h3>
    <h3 style="background-color: hsl(0, 100%, 50%);">100% saturation</h3>

    <h1>Light HSL</h1>
    <!--In light 0% means black, 50% means full color and 100% means white-->
    <h3 style="background-color: hsl(0, 100%, 0%);">0% light</h3>
    <h3 style="background-color: hsl(0, 100%, 50%);">50% Light</h3>
    <h3 style="background-color: hsl(0, 100%, 100%);">100% light</h3>

    <h1>HSLA, A- alpha (0-1)</h1>


</body>
</html>
