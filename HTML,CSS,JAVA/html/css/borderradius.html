<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            border: 1px solid black;
        }
        #box1{
            border-radius: 10px;
        }
        #box2{
            border-radius: 20px;
        }
        #box3{
            border-radius: 25%;
        }
        #box4{
            border-radius: 50%;
        }

    </style>
</head>
<body>
    <h1>Border Radius</h1>

    <div id="box1"></div>
    <br>
    <div id="box2"></div>
    <br>
    <div id="box3"></div>
    <br>
    <div id="box4"></div>

</body>
</html>
