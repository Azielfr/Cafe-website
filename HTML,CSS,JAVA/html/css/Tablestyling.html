<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/HTML,CSS,JAVA/CSS/table.css">
    <title>Document</title>
</head>
<body>
    <h1>Table Styling</h1>
    <!-- Create a gradesheet Table that includes 50 students name and grade -->
     <table>
        <caption>Student Gradesheet Table</caption>
        <tr>
            <th>SN</th>
            <th>Name</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Ram</td>
            <td>A</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Shyam</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Hari</td>
            <td>B</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Kanti</td>
            <td>B+</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Geta</td>
            <td>C</td>
        </tr>
     </table>

</body>
</html>
