<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content= "width=device-width, initial-scale=1.0">
    <title>Font properties</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>
<body>
    <h1>Font Properties Day </h1>
    <h3>Google Font</h3>
    <p style="font-family: 'poppins', sans-serif;">Poppins</p>
    <p style="font-family: 'sofia', cursive;">Sofia</p>
    <hr>
    <h3>Icons</h3>
    <p>Github: <a href="https://github.com/Azielfr/collage-codeing" style="color: black;"> <i class="fa-brands fa-github"> </i></a> </p> 
    <p>Instagram: <a href=""> <i class="fa-brands fa-instagram"></i> </a> </p>
    <hr>
    <h3>Font Weight</h3>

    <p style="font-weight: lighter;">Lighter</p>
    <p style="font-weight: normal;">Normal</p>
    <p style="font-weight: bold;">Bold</p>
    <p style="font-weight: bolder;">Bolder</p>
    <hr>
    <p style="font-weight: 700;">Bold</p>
    <p style="font-weight: 900;">Bolder</p>
    <p style="font-weight: 300;">Lighter</p>
    <p style="font-weight: 500;">Normal</p>
</body>
</html>
