<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes colorChange{
            from{
                background-color: orange;

            }
            to{
                background-color: skyblue;

            }
        }
        .box{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            animation: colorChange 3s ease-in 1s 15;
        }
        /* multipleframes */
        @keyframes colorAndPostion{
            0%{
                background-color: palegreen;
                top: 0px;
                bottom: 0px;
                left: 0px;
                right: 0px;
            }
            25%{
                background-color: lightgreen;
                top: 0px;
                bottom: 0px;
                left: 500px;
                right: 0px;
                
            }
            50%{
                background-color: greenyellow;
                top: 500px;
                bottom: 0px;
                left: 500px;
                right: 0px;
            }
            75%{
                background-color: green;
                top: 500px;
                bottom: 0px;
                left: 0px;
                right: 500px;
            }
            100%{
               background-color: darkgreen;
                top: 0px;
                bottom: 0px;
                left: 0px;
                right: 0px;
            }
        }
        .box1{
            width: 150px;
            height: 200px;
            background-color: palegreen;
            animation: colorAndPostion 4s ease-in-out 0s infinite;
            position: relative;
            /* top/right/bottom/left : 0 */
        }
    </style>
</head>
<body>
    <h1>Animation Style</h1>
    <!-- syntax:
     @keyframes animationName{
     }
     animation: animationName duration
     timing-function delay iteration; -->
    <div class="box"></div>
    <p>Multiple frames</p>
    <div class="box1"></div>
</body>
</html>
