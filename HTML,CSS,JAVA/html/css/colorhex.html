<body>
    <h1>Color in Hex</h1>
    <!--In Hex,
    Syntax : Color:#RRGGBB, #RGB
    for each RGB hex Values lowest is 0 and highest is F-->
    <h3 style="background-color: #ff0000;">Red</h3>
    <h3 style="background-color: #00ff00;">Green</h3>
    <h3 style="background-color: #0000ff;">Blue</h3>
    <h3 style="background-color: #000000; color: #ffffff;" >White and Black</h3>
    <h1 style="background-color: #f00;">Only 3 digits in hex code</h1>
</body>
