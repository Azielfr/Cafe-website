<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="background-color: rgba(255, 255, 0);">RGB Colors</h1>
    <!--rgb is an color standard that uses red, green and blue color to form thr spectrum of the color. The minimum value of each color is 0 and maximum is 255. 
    syntax:
    background-color: rgb(0,0,0);-->
    <!--in rgba - a is alpha (value of alpha is in the range of 0 - 1 means color is transparent, 1- means color is fully oppaque)-->
    <h3 style="background-color: rgba(255, 0, 0, 1);">rgba(255,0,0,1)</h3>
    <h3 style="background-color: rgba(255, 0, 0, 0.8);">rgba(255,0,0,0.8)</h3>
    <h3 style="background-color: rgba(255, 0, 0, 0.6);">rgba(255,0,0,0.6)</h3>
    <h3 style="background-color: rgba(255, 0, 0, 0.4);">rgba(255,0,0,0.4)</h3>
    <h3 style="background-color: rgba(255, 0, 0, 0.2);">rgba(255,0,0,0.2)</h3>
</body>
</html>
