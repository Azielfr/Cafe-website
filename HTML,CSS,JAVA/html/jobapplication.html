<!--Create a jobapplication.html. In job application web page create a form to take input for Full name, email, contact, address, province, (select-option), gender(radio), skills (checkbox), education(select-option), company, experience(select-option), cover letter (txt area)-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job application Form</title>
</head>
<body>
    <h1> Job Application Form</h1>
    <form action="" method=""></form>
        <fieldset>
            <legend>Application Form</legend>
            <h4>Personal Information</h4>

        <label for="name">Full name</label>
        <input type="text" name="name" id="name" placeholder="Ram Bahadur Karki" required>
        <br>
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
        <br>
        <br>
        <label for="contact">Contact No</label>
        <input type="tel" name="contact" id="contact" placeholder="9866392019" maxlength="10" minlength="10" required>
        <br>
        <br>
        <label for="address">Address</label>
        <input type="text" name="address" id="address" placeholder="Kathmandu" required>
        <br>
        <br>
        <label for="province"> Province</label>
        <select name="country" id="province" required>
            <option value="" disabled selected>Select</option>
            <option value="Bagmati">Bagmati</option>
            <option value="Koshi">Koshi</option>
            <option value="Madhesh">Madhesh</option>
            <option value="Gandaki">Gandaki</option>
            <option value="Lumbini">Lumbini</option>
            <option value="Karnali">Karnali</option>
            <option value="Sudurpaschim">Sudurpaschim</option>
        </select>
        <br>
        <br>
        <label for="">Gender</label>
            <br>
            <input type="radio" name="Gender" id="Male" value="Male">
            <label for="Male">Male</label>
            <input type="radio" name="Gender" id="Female" value="Female">
            <label for="Female">Female</label>
        <br>
        <br>
        <label for="">Skills</label>
            <br>
            <input type="checkbox" name="Skills" id="Python" value="Python">
            <label for="Python">Python</label>

            <input type="checkbox" name="Skills" id="database" value="database">
            <label for="database">Database</label>

            <input type="checkbox" name="Skills" id="java" value="java">
            <label for="java">Java</label>

            <input type="checkbox" name="Skills" id="php" value="php">
            <label for="php">Php</label>

            <input type="checkbox" name="Other" id="Other">
            <label for="Other">Others</label>
        <br>
        <br>
        <label for="education">Education</label>
        <select name="education" id="education" required>
            <option value="" disabled selected>Select</option>
            <option value="Secondary">Secondary</option>
            <option value="HigherSecondary">Higher Secondary</option>
            <option value="Diploma">Diploma</option>
            <option value="Bachlors">Bachlors</option>
            <option value="Alevels">A levels</option>
            <option value="Masters">Masters</option>
            <option value="Phd">Phd</option>
        </select>
        <br>
        <br>
        <label for="company">Company</label>
        <input type="text" name="Company" id="company" placeholder="previous company">
        <br>
        <br>
        <label for="experience">Experience</label>
        <select name="experience" id="experience" required>
            <option value="" disabled selected>Select</option>
            <option value="1">1+ years</option>
            <option value="2">2+ years</option>
            <option value="3">3+ years</option>
        </select>
        <br>
        <br>
        <label for="coverletter">Cover Letter</label>
        <br>
        <textarea name="coverletter" id="coverletter" placeholder="enter ur cover letter" cols="50" rows="10" required></textarea>
        <br>
        <br>
        <label for="CV">CV</label>
        <br>
        <input type="file" name="CV" id="CV" multiple accept=".pdf, .png">
        <br>
        <br>
        <button>Submit</button>
        </fieldset>
</body>
</html>
